name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build native core
        run: make native

      - name: Run unit and seed validation tests
        run: make test

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build runtime image
        run: docker build --tag mc-seed-ai-finder:ci .

      - name: Smoke test container
        run: |
          docker run -d --name mc-seed-ci -p 18000:8000 mc-seed-ai-finder:ci
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:18000/health/ready && exit 0
            sleep 1
          done
          docker logs mc-seed-ci
          exit 1

      - name: Remove smoke container
        if: always()
        run: docker rm --force mc-seed-ci || true
