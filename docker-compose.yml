version: "3.8"

services:
  mc-seed-ai-finder:
    build:
      context: .
      args:
        CUBIOMES_COMMIT: e61f90580cbdd883214a8054670dacae655e59c0
    image: mc-seed-ai-finder:latest
    restart: unless-stopped
    ports:
      - "${MCFINDER_PORT:-8000}:8000"
    environment:
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      MCFINDER_DB: /app/data/app.sqlite3
      MCFINDER_EVOLUTION_DIR: /app/data/evolution
      MC_QUERY_WORKERS: ${MC_QUERY_WORKERS:-}
      MC_QUERY_BATCH_SIZE: ${MC_QUERY_BATCH_SIZE:-}
      SEARCH_JOB_WORKERS: ${SEARCH_JOB_WORKERS:-1}
      SEARCH_JOB_RETENTION_DAYS: ${SEARCH_JOB_RETENTION_DAYS:-30}
      MCFINDER_MAP_CACHE_DIR: /app/data/map-cache
      MCFINDER_MAP_CACHE_MAX_AGE_DAYS: ${MCFINDER_MAP_CACHE_MAX_AGE_DAYS:-30}
      MCFINDER_MAP_CACHE_MAX_BYTES: ${MCFINDER_MAP_CACHE_MAX_BYTES:-2147483648}
    volumes:
      - mc-seed-data:/app/data

volumes:
  mc-seed-data:
